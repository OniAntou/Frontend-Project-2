<!doctype html>
<html lang="ja">
	<head>
		<title>Product Details – nanyano Online Store</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="shortcut icon" href="https://cdn.shopify.com/s/files/1/0608/1973/4744/files/02_6470ed61-6833-4454-b9a9-394842d1c878_32x32.png?v=1639318789">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Muli:wght@300;400;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" type="text/css" href="style.css">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="https://kit.fontawesome.com/9872bf6952.js" crossorigin="anonymous"></script>
	</head>
	<body>
		<div class="announcement-bar">
			<p>送料・配送についてはこちらをご確認ください</p>
		</div>

		<header class="nav-top">
			<div class="nav-top-logo">
				<div class="nav-logo">
					<a href="index.html"><img src="https://cdn.shopify.com/s/files/1/0608/1973/4744/files/03_180x.png?v=1639032058" alt="nanyano logo"></a>
				</div>
			</div>
			<div class="nav-top-icon">
				<div class="nav-icon">
					<button id="search-btn" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
					<button id="account-btn" aria-label="Account"><i class="fa-solid fa-user"></i></button>
					<div class="cart-icon-wrapper">
						<button id="cart-btn" aria-label="Cart">
							<i class="fa-solid fa-bag-shopping"></i>
							<span class="cart-count">0</span>
						</button>
					</div>
				</div>
			</div>
		</header>

		<main class="main-content">
			<nav class="breadcrumb-nav">
				<a href="index.html">ホーム</a> / <span class="current-product-name">Product Name</span>
			</nav>

			<div class="product-detail-container">
				<div class="product-detail-image">
					<img src="" alt="Product Image">
				</div>
				<div class="product-detail-info">
					<h1 class="product-detail-title">Product Title</h1>
					<p class="product-detail-price">¥0</p>
					
					<div class="product-detail-description">
						<!-- Dynamic Description -->
					</div>

					<div class="product-detail-options">
						<div class="quantity-selector">
							<label for="quantity">数量</label>
							<input type="number" id="quantity" name="quantity" value="1" min="1" class="quantity-input">
						</div>
						<button class="btn-add-to-cart">カートに追加する</button>
					</div>
				</div>
			</div>
		</main>

		<footer class="footer">
			<div class="footer-top">
				<div class="footer-social">
					<a href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
					<a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
					<a href="#" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
				</div>
				<div class="footer-newsletter">
					<p>メルマガ登録</p>
					<div class="newsletter-form">
						<input type="email" placeholder="メールアドレス">
						<button type="submit" aria-label="Subscribe"><i class="fa-solid fa-arrow-right"></i></button>
					</div>
				</div>
			</div>

			<div class="footer-nav">
				<a href="index.html">top</a>
				<a href="#">legal notice</a>
				<a href="#">privacy policy</a>
				<a href="#">refund policy</a>
				<a href="#">terms of service</a>
				<a href="#">offical site</a>
			</div>
			<div class="footer-bottom">
				<div class="footer-selectors">
					<!-- Currency Dropdown -->
					<div class="custom-dropdown" id="currency-dropdown">
						<button class="dropdown-toggle">
							<span class="selected-text">日本 (JPY ¥)</span>
							<i class="fa-solid fa-angle-down"></i>
						</button>
						<div class="dropdown-menu">
							<div class="dropdown-item active" data-value="JPY">日本 (JPY ¥)</div>
							<div class="dropdown-item" data-value="USD">United States (USD $)</div>
							<div class="dropdown-item" data-value="EUR">Europe (EUR €)</div>
						</div>
					</div>

					<!-- Language Dropdown -->
					<div class="custom-dropdown" id="lang-dropdown">
						<button class="dropdown-toggle">
							<span class="selected-text">日本語</span>
							<i class="fa-solid fa-angle-down"></i>
						</button>
						<div class="dropdown-menu">
							<div class="dropdown-item active" data-value="ja">日本語</div>
							<div class="dropdown-item" data-value="en">English</div>
						</div>
					</div>
				</div>
				<div class="footer-copyright">
					<small>&copy; 2026, nanyano OnlineStore Powered by Shopify</small>
				</div>
			</div>
		</footer>

		<script src="data.js"></script>
		<script src="main.js"></script>
	</body>
</html>
